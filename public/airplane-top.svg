<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Fuselage -->
    <linearGradient id="fuse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8A9BB0"/>
      <stop offset="25%"  stop-color="#D8E4F0"/>
      <stop offset="50%"  stop-color="#F0F6FF"/>
      <stop offset="75%"  stop-color="#D8E4F0"/>
      <stop offset="100%" stop-color="#8A9BB0"/>
    </linearGradient>

    <!-- Wings -->
    <linearGradient id="wingL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E0EAF5"/>
      <stop offset="60%"  stop-color="#C0D0E0"/>
      <stop offset="100%" stop-color="#98ACC0"/>
    </linearGradient>
    <linearGradient id="wingR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#E0EAF5"/>
      <stop offset="60%"  stop-color="#C0D0E0"/>
      <stop offset="100%" stop-color="#98ACC0"/>
    </linearGradient>

    <!-- Nacelle -->
    <linearGradient id="nac" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9AAABB"/>
      <stop offset="50%"  stop-color="#B8C8D8"/>
      <stop offset="100%" stop-color="#606878"/>
    </linearGradient>

    <!-- Stab -->
    <linearGradient id="stab" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#C8D8E8"/>
      <stop offset="100%" stop-color="#90A0B0"/>
    </linearGradient>
    <linearGradient id="stabR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C8D8E8"/>
      <stop offset="100%" stop-color="#90A0B0"/>
    </linearGradient>
  </defs>

  <g filter="url(#glow)">

    <!-- ══ LEFT WING ══ -->
    <path d="M 63,42  C 58,44 40,52 10,66  L 8,73  C 14,74 22,72 32,68  L 48,60  L 62,52 Z"
          fill="url(#wingL)" stroke="#9BAFC3" stroke-width="0.5"/>
    <!-- Leading edge highlight -->
    <path d="M 63,42 C 58,44 40,52 10,66"
          stroke="rgba(255,255,255,0.6)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Panel line -->
    <path d="M 62,46 C 54,49 36,57 14,69"
          stroke="rgba(180,200,220,0.4)" stroke-width="0.5" fill="none"/>
    <!-- Winglet -->
    <path d="M 8,73 L 5,71 L 4,75 L 7,77 L 10,75 Z"
          fill="#B0C4D8" stroke="#9BAFC3" stroke-width="0.3"/>

    <!-- ══ RIGHT WING ══ -->
    <path d="M 77,42  C 82,44 100,52 130,66  L 132,73  C 126,74 118,72 108,68  L 92,60  L 78,52 Z"
          fill="url(#wingR)" stroke="#9BAFC3" stroke-width="0.5"/>
    <path d="M 77,42 C 82,44 100,52 130,66"
          stroke="rgba(255,255,255,0.6)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 78,46 C 86,49 104,57 126,69"
          stroke="rgba(180,200,220,0.4)" stroke-width="0.5" fill="none"/>
    <path d="M 132,73 L 135,71 L 136,75 L 133,77 L 130,75 Z"
          fill="#B0C4D8" stroke="#9BAFC3" stroke-width="0.3"/>

    <!-- ══ ENGINE LEFT ══ -->
    <rect x="14" y="63" width="18" height="7" rx="3.5"
          fill="url(#nac)" stroke="#7090A8" stroke-width="0.4"/>
    <ellipse cx="15.5" cy="66.5" rx="3.2" ry="3.5" fill="#3A4858" stroke="#5A6878" stroke-width="0.3"/>
    <ellipse cx="15.5" cy="66.5" rx="1.8" ry="2"   fill="#222C38"/>
    <ellipse cx="31"   cy="66.5" rx="2"   ry="2.5" fill="#505A68"/>

    <!-- ══ ENGINE RIGHT ══ -->
    <rect x="108" y="63" width="18" height="7" rx="3.5"
          fill="url(#nac)" stroke="#7090A8" stroke-width="0.4"/>
    <ellipse cx="124.5" cy="66.5" rx="3.2" ry="3.5" fill="#3A4858" stroke="#5A6878" stroke-width="0.3"/>
    <ellipse cx="124.5" cy="66.5" rx="1.8" ry="2"   fill="#222C38"/>
    <ellipse cx="109"   cy="66.5" rx="2"   ry="2.5" fill="#505A68"/>

    <!-- ══ LEFT STABILIZER ══ -->
    <path d="M 62,95 C 58,96 46,100 34,106 L 33,110 C 38,110 46,108 54,104 L 62,100 Z"
          fill="url(#stab)" stroke="#8AAABB" stroke-width="0.4"/>
    <path d="M 62,95 C 58,96 46,100 34,106"
          stroke="rgba(255,255,255,0.4)" stroke-width="0.7" fill="none" stroke-linecap="round"/>

    <!-- ══ RIGHT STABILIZER ══ -->
    <path d="M 78,95 C 82,96 94,100 106,106 L 107,110 C 102,110 94,108 86,104 L 78,100 Z"
          fill="url(#stabR)" stroke="#8AAABB" stroke-width="0.4"/>
    <path d="M 78,95 C 82,96 94,100 106,106"
          stroke="rgba(255,255,255,0.4)" stroke-width="0.7" fill="none" stroke-linecap="round"/>

    <!-- ══ FUSELAGE ══ -->
    <path d="M 70,6
             C 74,7 76,12 76,20
             L 75,40 L 75,52 L 75,68
             L 74,88 L 73,96 L 72,108
             C 71,112 70,115 70,115
             C 70,115 70,115 70,115
             C 70,115 70,115 70,115
             C 70,115 69,112 68,108
             L 67,96 L 66,88
             L 65,68 L 65,52 L 65,40
             L 64,20 C 64,12 66,7 70,6 Z"
          fill="url(#fuse)" stroke="#8AAABB" stroke-width="0.6"/>

    <!-- Center highlight -->
    <line x1="70" y1="14" x2="70" y2="105" stroke="rgba(255,255,255,0.28)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- ══ NOSE ══ -->
    <path d="M 70,6 C 67.5,6 65.5,4 65.5,2 Q 67.5,0 70,0 Q 72.5,0 74.5,2 C 74.5,4 72.5,6 70,6 Z"
          fill="#C8D8EC"/>
    <path d="M 70,0.5 C 71,1 72,2 72,3" stroke="rgba(255,255,255,0.55)" stroke-width="0.5" fill="none" stroke-linecap="round"/>

    <!-- ══ COCKPIT ══ -->
    <ellipse cx="67.5" cy="13" rx="2"   ry="2.6" fill="#7AADCF" opacity="0.9"/>
    <ellipse cx="72.5" cy="13" rx="2"   ry="2.6" fill="#7AADCF" opacity="0.9"/>
    <ellipse cx="67"   cy="12" rx="0.7" ry="0.9" fill="rgba(255,255,255,0.65)"/>
    <ellipse cx="72"   cy="12" rx="0.7" ry="0.9" fill="rgba(255,255,255,0.65)"/>
    <ellipse cx="70"   cy="10" rx="1.3" ry="1.7" fill="#8ABFD8" opacity="0.85"/>

    <!-- ══ WINDOWS left ══ -->
    <rect x="63" y="26" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="63" y="32" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="63" y="38" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="63" y="75" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="63" y="81" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <!-- ══ WINDOWS right ══ -->
    <rect x="74" y="26" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="74" y="32" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="74" y="38" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="74" y="75" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>
    <rect x="74" y="81" width="3" height="1.8" rx="0.7" fill="rgba(200,230,255,0.5)"/>

    <!-- ══ VERTICAL FIN ══ -->
    <path d="M 69,90 L 69,112 C 69.5,115 70,116 70,116 C 70,116 70.5,115 71,112 L 71,90 Z"
          fill="#C0D4E8" stroke="#9AB4CC" stroke-width="0.3"/>

    <!-- ══ NAV LIGHTS ══ -->
    <circle cx="4.5"   cy="74" r="1.3" fill="#FF4040" opacity="0.95"/>
    <circle cx="4.5"   cy="74" r="2.8" fill="rgba(255,50,50,0.2)"/>
    <circle cx="135.5" cy="74" r="1.3" fill="#40FF80" opacity="0.95"/>
    <circle cx="135.5" cy="74" r="2.8" fill="rgba(50,255,100,0.2)"/>
    <circle cx="70"    cy="112" r="1"  fill="rgba(255,255,255,0.9)"/>
    <circle cx="70"    cy="112" r="2"  fill="rgba(255,255,255,0.2)"/>

  </g>
</svg>
