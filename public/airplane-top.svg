<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7A90A8"/>
      <stop offset="30%"  stop-color="#C8DCF0"/>
      <stop offset="50%"  stop-color="#E8F4FF"/>
      <stop offset="70%"  stop-color="#C8DCF0"/>
      <stop offset="100%" stop-color="#7A90A8"/>
    </linearGradient>
    <linearGradient id="wl" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#D0E4F8"/>
      <stop offset="100%" stop-color="#8AAAC8"/>
    </linearGradient>
    <linearGradient id="wr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#D0E4F8"/>
      <stop offset="100%" stop-color="#8AAAC8"/>
    </linearGradient>
    <linearGradient id="eng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A0B8D0"/>
      <stop offset="50%"  stop-color="#C0D4E8"/>
      <stop offset="100%" stop-color="#5A6878"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">

    <!-- LEFT WING: wide, swept back, realistic -->
    <path d="M 74,68  L 8,95  L 6,104  L 18,102  L 42,92  L 68,80  L 74,76 Z"
          fill="url(#wl)" stroke="#8AAAC0" stroke-width="0.6"/>
    <!-- wing leading edge shine -->
    <path d="M 74,68 L 8,95" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- winglet -->
    <path d="M 6,104 L 2,101 L 1,106 L 4,109 L 8,107 Z" fill="#A0BCCE" stroke="#8AAAC0" stroke-width="0.4"/>

    <!-- RIGHT WING -->
    <path d="M 86,68  L 152,95  L 154,104  L 142,102  L 118,92  L 92,80  L 86,76 Z"
          fill="url(#wr)" stroke="#8AAAC0" stroke-width="0.6"/>
    <path d="M 86,68 L 152,95" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M 154,104 L 158,101 L 159,106 L 156,109 L 152,107 Z" fill="#A0BCCE" stroke="#8AAAC0" stroke-width="0.4"/>

    <!-- LEFT ENGINE -->
    <rect x="18" y="91" width="22" height="9" rx="4.5" fill="url(#eng)" stroke="#6888A0" stroke-width="0.5"/>
    <ellipse cx="20" cy="95.5" rx="4" ry="4.5" fill="#2A3848" stroke="#4A6070" stroke-width="0.4"/>
    <ellipse cx="20" cy="95.5" rx="2.2" ry="2.6" fill="#161E28"/>
    <ellipse cx="39" cy="95.5" rx="2.5" ry="3" fill="#485868"/>

    <!-- RIGHT ENGINE -->
    <rect x="120" y="91" width="22" height="9" rx="4.5" fill="url(#eng)" stroke="#6888A0" stroke-width="0.5"/>
    <ellipse cx="140" cy="95.5" rx="4" ry="4.5" fill="#2A3848" stroke="#4A6070" stroke-width="0.4"/>
    <ellipse cx="140" cy="95.5" rx="2.2" ry="2.6" fill="#161E28"/>
    <ellipse cx="121" cy="95.5" rx="2.5" ry="3" fill="#485868"/>

    <!-- LEFT STABILIZER -->
    <path d="M 74,128 L 38,144 L 37,150 L 50,148 L 66,140 L 74,134 Z"
          fill="#B0C8DC" stroke="#8AAAC0" stroke-width="0.5"/>
    <path d="M 74,128 L 38,144" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>

    <!-- RIGHT STABILIZER -->
    <path d="M 86,128 L 122,144 L 123,150 L 110,148 L 94,140 L 86,134 Z"
          fill="#B0C8DC" stroke="#8AAAC0" stroke-width="0.5"/>
    <path d="M 86,128 L 122,144" stroke="rgba(255,255,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>

    <!-- FUSELAGE -->
    <path d="M 80,8
             C 84,9 87,16 87,26
             L 86,55 L 86,75 L 86,100
             L 85,120 L 84,132 L 83,144
             C 82,150 80,154 80,154
             C 80,154 78,150 77,144
             L 76,132 L 75,120
             L 74,100 L 74,75 L 74,55
             L 73,26 C 73,16 76,9 80,8 Z"
          fill="url(#body)" stroke="#8AAABB" stroke-width="0.7"/>

    <!-- fuselage center line highlight -->
    <line x1="80" y1="18" x2="80" y2="145"
          stroke="rgba(255,255,255,0.25)" stroke-width="1.4" stroke-linecap="round"/>

    <!-- NOSE -->
    <path d="M 80,8 C 77,8 75,6 75,3 Q 77,0 80,0 Q 83,0 85,3 C 85,6 83,8 80,8 Z"
          fill="#D0E4F4"/>
    <path d="M 80,1 C 81.5,2 82.5,3.5 82.5,5"
          stroke="rgba(255,255,255,0.6)" stroke-width="0.6" fill="none" stroke-linecap="round"/>

    <!-- COCKPIT WINDOWS -->
    <ellipse cx="77" cy="19" rx="2.2" ry="3" fill="#6AAECE" opacity="0.9"/>
    <ellipse cx="83" cy="19" rx="2.2" ry="3" fill="#6AAECE" opacity="0.9"/>
    <ellipse cx="76.5" cy="18" rx="0.8" ry="1" fill="rgba(255,255,255,0.6)"/>
    <ellipse cx="82.5" cy="18" rx="0.8" ry="1" fill="rgba(255,255,255,0.6)"/>

    <!-- CABIN WINDOWS left -->
    <rect x="72" y="34" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="72" y="42" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="72" y="50" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="72" y="108" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.45)"/>
    <rect x="72" y="116" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.45)"/>
    <!-- CABIN WINDOWS right -->
    <rect x="84.5" y="34" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="84.5" y="42" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="84.5" y="50" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.5)"/>
    <rect x="84.5" y="108" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.45)"/>
    <rect x="84.5" y="116" width="3.5" height="2.2" rx="0.9" fill="rgba(190,225,255,0.45)"/>

    <!-- VERTICAL FIN -->
    <path d="M 79,124 L 79,150 C 79.5,153 80,155 80,155 C 80,155 80.5,153 81,150 L 81,124 Z"
          fill="#B8D0E8" stroke="#90B0C8" stroke-width="0.4"/>

    <!-- NAV LIGHTS -->
    <circle cx="1.5"   cy="105" r="1.6" fill="#FF3333" opacity="0.95"/>
    <circle cx="1.5"   cy="105" r="3.5" fill="rgba(255,50,50,0.18)"/>
    <circle cx="158.5" cy="105" r="1.6" fill="#33FF66" opacity="0.95"/>
    <circle cx="158.5" cy="105" r="3.5" fill="rgba(50,255,100,0.18)"/>
    <circle cx="80"    cy="150" r="1.2" fill="rgba(255,255,255,0.9)"/>
    <circle cx="80"    cy="150" r="2.5" fill="rgba(255,255,255,0.18)"/>

  </g>
</svg>
